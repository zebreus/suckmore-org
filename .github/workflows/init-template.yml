name: Initialise Template
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  init-template:
    name: Replace example-webapp with repo name
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure Git
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace example-webapp with repo name
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          echo "Replacing example-webapp with $REPO_NAME"
          find . -type f \
            -not -path './.git/*' \
            -not -path './.github/workflows/init-template.yml' \
            -exec sed -i "s/example-webapp/$REPO_NAME/g" {} +

      - name: Remove this workflow
        run: rm .github/workflows/init-template.yml

      - name: Commit and push changes
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Rename example-webapp to ${GITHUB_REPOSITORY##*/}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
